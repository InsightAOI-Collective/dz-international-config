name: AI-Translate
on:
  workflow_dispatch:
    inputs:
      command:
        required: true
        description: 要操作的命令
        type: choice
        options:
        - full-load
        - diff
        - self-check
        - backtest
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.ref || github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  Workflow:
    name: Build and Deploy
    runs-on: dz-action-runner
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Checkout dz_ai_translation 源码
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          repository: InsightAOI-Collective/dz_ai_translation
          path: dz_ai_translation

      # Checkout dz-international-config 仓库
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          repository: InsightAOI-Collective/dz-international-config
          ref: develop
          path: dz-international-config

      # Go 安装和依赖缓存
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: dz_ai_translation/go.sum
        env:
          GO_INSTALL_BASE_URL: "https://golang.google.cn/dl/"

      # Build dz_ai_translation
      - shell: bash
        env:
          GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: "ai_translation"
          PLATFORM_DIR: ${{ github.workspace }}/platform
        run: |
          cd dz_ai_translation
          go mod tidy
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          protoc --go_out=. --go_opt=paths=source_relative internal/conf/conf.proto
          protoc --go-grpc_out=. --go-grpc_opt=paths=source_relative internal/conf/conf.proto || true
          go build -o ./bin/ ./...
          go install github.com/a8m/envsubst/cmd/envsubst@latest
          ~/go/bin/envsubst < configs/dev.yaml.tpl > configs/dev.yaml

      # 执行 full-load/self-check/backtest
      - shell: bash
        if: github.event.inputs.command == 'full-load' || github.event.inputs.command == 'self-check' || github.event.inputs.command == 'backtest'
        run: |
          ./dz_ai_translation/bin/cmd -conf ./dz_ai_translation/configs/dev.yaml ${{ github.event.inputs.command }}

      # 执行 diff
      - shell: bash
        if: github.event.inputs.command == 'diff'
        run: |
          # 获取 dz-international-config develop commit
          cd ../dz-international-config
          git fetch origin develop
          git checkout develop
          DZ_ICOMMIT=$(git rev-parse HEAD)
          cd ../dz_ai_translation
          # 获取 dz_ai_translation main commit
          DA_COMMIT=$(git rev-parse HEAD)
          # 比较两个仓库对应文件差异
          git --no-pager diff --name-only $DZ_ICOMMIT $DA_COMMIT | grep '\.json$' > json_diff.txt
          files=$(cat json_diff.txt)
          if [ -n "$files" ]; then
            ./dz_ai_translation/bin/cmd -conf ./dz_ai_translation/configs/dev.yaml diff $files
          else
            echo "No JSON changes to diff"
          fi

      # 创建 PR
      - uses: peter-evans/create-pull-request@v7
        id: cpr
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          base: develop
          branch: ai-translation
          title: "AI translation update"

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

  Push-Diff:
    name: Push Triggered Diff
    runs-on: dz-action-runner
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Sleep for 30 seconds before diff
        run: sleep 30

      # Checkout dz_ai_translation
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          repository: InsightAOI-Collective/dz_ai_translation
          path: dz_ai_translation

      # Checkout dz-international-config
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          repository: InsightAOI-Collective/dz-international-config
          ref: develop
          path: dz-international-config

      # Go 安装和依赖缓存
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: dz_ai_translation/go.sum
        env:
          GO_INSTALL_BASE_URL: "https://golang.google.cn/dl/"

      # Build dz_ai_translation
      - shell: bash
        env:
          GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: "ai_translation"
          PLATFORM_DIR: ${{ github.workspace }}/platform
        run: |
          cd dz_ai_translation
          go mod tidy
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          protoc --go_out=. --go_opt=paths=source_relative internal/conf/conf.proto
          protoc --go-grpc_out=. --go-grpc_opt=paths=source_relative internal/conf/conf.proto || true
          go build -o ./bin/ ./...
          go install github.com/a8m/envsubst/cmd/envsubst@latest
          ~/go/bin/envsubst < configs/dev.yaml.tpl > configs/dev.yaml

      # diff 比较
      - shell: bash
        run: |
          cd ../dz-international-config
          git fetch origin develop
          git checkout develop
          DZ_ICOMMIT=$(git rev-parse HEAD)
          cd ../dz_ai_translation
          DA_COMMIT=$(git rev-parse HEAD)
          git --no-pager diff --name-only $DZ_ICOMMIT $DA_COMMIT | grep '\.json$' > json_diff.txt
          files=$(cat json_diff.txt)
          if [ -n "$files" ]; then
            ./dz_ai_translation/bin/cmd -conf ./dz_ai_translation/configs/dev.yaml diff $files
          else
            echo "No JSON changes to diff"
          fi

      - uses: peter-evans/create-pull-request@v7
        id: cpr
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          base: develop
          branch: ai-translation
          title: "AI translation update (push triggered)"

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.DZ_GH_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
